# Render static site — MobiIndicator iOS web app (Add to Home Screen)
# https://render.com/docs/static-sites
services:
  - type: web
    name: mobiindicator-web
    runtime: static
    buildCommand: npm ci && npm run build:web
    staticPublishPath: dist
    envVars:
      - key: EXPO_PUBLIC_API_BASE
        value: https://mobiindicator.com/live-api
      - key: EXPO_PUBLIC_CHART_BASE
        value: https://mobiindicator.com/chart
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
